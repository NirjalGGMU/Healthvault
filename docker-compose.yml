services:
  backend:
    build:
      context: ./healthcare-backned
      dockerfile: Dockerfile
    env_file:
      - ./healthcare-backned/.env
    ports:
      - "5001:5001"
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./healthvault_frontend
      dockerfile: Dockerfile
      args:
        # Browser-facing URL — the frontend is client-side JS, so it must reach the
        # backend at the same host-mapped port, not the internal Docker network name.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 256m

volumes:
  backend-uploads:
  backend-logs:
